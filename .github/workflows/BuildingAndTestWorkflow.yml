name: BuildingAndTestWorkflow

on:
  pull_request:
    branches:
      - main
  push:

env:
  PROJECT_TYPE: ${{ vars.PROJECT_TYPE }}
  JAVA_VERSION: ${{ vars.PROJECT_VERSION }}
  NODE_VERSION: ${{ vars.PROJECT_VERSION }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Lint
        uses: ./.github/actions/setup-java-project
        with:
          project-type: ${{ env.PROJECT_TYPE }}
          task: lint
          java-version: ${{ env.JAVA_VERSION }}
          node-version: ${{ env.NODE_VERSION }}

  unit-test:
    needs: lint
    uses: ./.github/workflows/test-reusable.yml
    with:
      project-type: java
      task: unit-test
      java-version: '21'
      node-version: '20'

  integration-test:
    needs: unit-test
    uses: ./.github/workflows/test-reusable.yml
    with:
      project-type: java
      task: integration-test
      java-version: '21'
      node-version: '20'

  e2e-test:
    needs: integration-test
    uses: ./.github/workflows/test-reusable.yml
    with:
      project-type: java
      task: e2e-test
      java-version: '21'
      node-version: '20'
  build:
    runs-on: ubuntu-latest
    needs:
     e2e-test

    steps:
      - uses: actions/checkout@v4

      - name: Run Build
        uses: ./.github/actions/setup-java-project
        with:
          project-type: java
          task: build
          java-version: '21'
          node-version: '20'
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
  container-image:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target

      - name: Build Docker Image
        run: docker build -t aleasofttrainner:latest .
  deploy:
    runs-on: ubuntu-latest
    needs: container-image
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy to Render
        run: curl "$RENDER_DEPLOY_HOOK"
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}