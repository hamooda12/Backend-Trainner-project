name: BuildingAndTestWorkflow.yml
on:
  pull_request:
    branches:
      - main
  push:



jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java Project
        uses: ./.github/actions/setup-java-project
      - name: Run Checkstyle
        run: mvn checkstyle:check
